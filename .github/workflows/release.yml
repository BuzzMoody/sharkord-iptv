name: Manual Build and Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Type of release update'
        required: true
        type: choice
        default: 'patch'
        options:
          - patch  # 0.0.x
          - minor  # 0.x.0
          - major  # x.0.0

jobs:
  build-and-release:
    name: Build, Version, and Upload Release
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push the version commit, tag, and release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # We need to tell Git who is making the commit so it can push the updated package.json
      - name: Configure Git User
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Bump Version and Create Tag
        id: bump_version
        run: |
          # This bumps the version in package.json, commits it, and creates a tag (e.g. v0.0.3)
          NEW_TAG=$(npm version ${{ github.event.inputs.bump_type }})
          
          # Save the new tag so the Release step knows what to name the release
          echo "tag=$NEW_TAG" >> $GITHUB_ENV

      - name: Push Version Update
        run: |
          git push origin HEAD
          git push origin --tags

      - name: Build and Zip
        run: bun run build:zip

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.tag }}
          files: sharkord-iptv.zip
          generate_release_notes: true
